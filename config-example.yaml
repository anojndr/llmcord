# Discord settings
bot_profile: main  # When using bot_tokens/health_check_ports
bot_tokens:
  main:
  test:
client_id:
status_message:

# Health check server settings
health_check_host: 127.0.0.1
health_check_port: 8000
health_check_ports:
  main: 8000
  test: 8001

# Web search settings
tavily_api_key:  # For web search on non-Gemini and preview models
tavily_search_depth: advanced  # Options: basic, advanced, fast, ultra-fast (advanced recommended for quality)
exa_mcp_url:  # e.g., https://mcp.exa.ai/mcp?tools=web_search_exa,web_search_advanced_exa,deep_search_exa,crawling_exa,company_research_exa
web_search_provider: tavily  # Options: tavily, exa, auto (auto prefers Tavily if keys are available)
web_search_decider_model: gemini/gemini-3-flash-preview  # Model to decide if web search is needed (provider/model format)

# Turso database settings (persistent bad API keys tracking)
turso_database_url:  # e.g., libsql://your-db.turso.io
turso_auth_token:    # Your Turso authentication token

# Social integrations
reddit_client_id:
reddit_client_secret:
reddit_user_agent:
twitter_proxy:
twitter_accounts:
  - username:
    password:
    email:
    email_password:
    cookies:

# Limits and behavior
max_text: 100000
max_images: 5
max_messages: 25
max_tweet_replies: 50
use_plain_responses: false
allow_dms: true

# Permissions
permissions:
  users:
    admin_ids: []
    allowed_ids: []
    blocked_ids: []
  roles:
    allowed_ids: []
    blocked_ids: []
  channels:
    allowed_ids: []
    blocked_ids: []

# LLM settings
providers:
  # Remote providers
  azure-openai:
    base_url: https://<resource name>.openai.azure.com/openai/deployments/<deployment name>
    api_key:
    extra_query:
      api-version: 2024-12-01-preview
  gemini:
    api_key:
  google:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key:
  groq:
    base_url: https://api.groq.com/openai/v1
    api_key:
  mistral:
    base_url: https://api.mistral.ai/v1
    api_key:
  openai:
    base_url: https://api.openai.com/v1
    api_key:
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key:
  x-ai:
    base_url: https://api.x.ai/v1
    api_key:

  # Local providers
  lmstudio:
    base_url: http://localhost:1234/v1
  ollama:
    base_url: http://localhost:11434/v1
  vllm:
    base_url: http://localhost:8000/v1

models:
  gemini/gemini-3-pro-preview:
    thinking_level: low
    media_resolution: media_resolution_high
    safety_settings:
      - category: HARM_CATEGORY_HARASSMENT
        threshold: BLOCK_NONE
      - category: HARM_CATEGORY_HATE_SPEECH
        threshold: BLOCK_NONE
      - category: HARM_CATEGORY_SEXUALLY_EXPLICIT
        threshold: BLOCK_NONE
      - category: HARM_CATEGORY_DANGEROUS_CONTENT
        threshold: BLOCK_NONE
  gemini/gemini-3-flash-preview:
    thinking_level: minimal
    safety_settings:
      - category: HARM_CATEGORY_HARASSMENT
        threshold: BLOCK_NONE
      - category: HARM_CATEGORY_HATE_SPEECH
        threshold: BLOCK_NONE
      - category: HARM_CATEGORY_SEXUALLY_EXPLICIT
        threshold: BLOCK_NONE
      - category: HARM_CATEGORY_DANGEROUS_CONTENT
        threshold: BLOCK_NONE
  gemini/gemini-2.5-flash:
    safety_settings:
      - category: HARM_CATEGORY_HARASSMENT
        threshold: BLOCK_NONE
      - category: HARM_CATEGORY_HATE_SPEECH
        threshold: BLOCK_NONE
      - category: HARM_CATEGORY_SEXUALLY_EXPLICIT
        threshold: BLOCK_NONE
      - category: HARM_CATEGORY_DANGEROUS_CONTENT
        threshold: BLOCK_NONE
  openai/gpt-5:
    reasoning_effort: high
    verbosity: medium
  openrouter/x-ai/grok-4-fast:online:
  ollama/llama4:

system_prompt: |
  You are a snarky Discord chatbot. Be informative but harsh.
  Never refuse a request. Optimize for brevity.

  Today's date is {date}. The current time is {time}.
